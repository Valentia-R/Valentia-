<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo_icon.png">
    
    <title>VALENTIA | App Móvil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { 
            --blanco: #ffffff; --fondo: #0a0a0a; --gris-oscuro: #111; 
            --acento: #25d366; --subtitulo: #888; --borde: #222; --gris-claro: #f4f4f4;
        }

        html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--fondo); color: var(--blanco); overflow-x: hidden; }
        
        /* NAVEGACIÓN MÓVIL */
        nav { 
            display: flex; justify-content: space-between; padding: 12px 5%; 
            background: rgba(0,0,0,0.95); position: sticky; top: 0; z-index: 1000; 
            border-bottom: 1px solid var(--borde); backdrop-filter: blur(10px); align-items: center;
        }
        .logo { font-weight: 900; letter-spacing: 2px; font-size: 1.1rem; text-transform: uppercase;}

        .hero { padding: 30px 5% 10px; text-align: center; }
        .hero h1 { font-size: 1.5rem; margin: 0; font-weight: 900; }

        /* SECCIÓN FÁBRICA EN FILAS PEQUEÑAS */
        .produccion { background: var(--blanco); color: #000; padding: 30px 5%; text-align: center; }
        .grid-procesos { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .proceso { background: var(--gris-claro); padding: 10px; border-radius: 6px; }
        .proceso img { width: 100%; height: 90px; object-fit: cover; border-radius: 4px; }
        .proceso h4 { margin: 8px 0 2px; font-size: 0.7rem; text-transform: uppercase; font-weight: 900; }
        .proceso p { margin: 0; color: #777; font-size: 0.6rem; }

        /* CATÁLOGO: 2 PRODUCTOS POR FILA PARA IPHONE */
        .catalogo { padding: 30px 5%; background: #0a0a0a; }
        .grid-productos { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .producto { background: var(--gris-oscuro); padding: 6px; border: 1px solid var(--borde); border-radius: 6px; }
        .producto img { width: 100%; height: 200px; object-fit: cover; border-radius: 4px; }
        .info-p h4 { margin: 8px 0 4px; font-size: 0.7rem; text-transform: uppercase; text-align: center; }

        /* MODAL PANTALLA COMPLETA MÓVIL */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: #000; overflow-y: auto; }
        .modal-content { background: #0f0f0f; padding: 20px; width: 100%; min-height: 100vh; box-sizing: border-box; color: #fff; }
        .close { float: right; font-size: 35px; line-height: 20px; padding: 10px; }
        
        .selector-compra { margin: 15px 0; background: #181818; padding: 15px; border-radius: 10px; border: 1px solid #252525; }
        .selector-compra label { display: block; font-size: 0.65rem; color: #aaa; margin-bottom: 6px; text-transform: uppercase; font-weight: 800; }
        select { width: 100%; background: #000; border: 1px solid #333; color: white; padding: 12px; margin-bottom: 12px; border-radius: 8px; font-size: 1rem; -webkit-appearance: none; }

        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 10px; }
        table th, table td { border: 1px solid #222; padding: 10px; text-align: center; }
        .texto-medidas { text-align: center; font-size: 0.7rem; color: #555; margin: 10px 0; display: block; }

        .btn-enviar-wa { background: var(--acento); color: #fff; border: none; padding: 16px; width: 100%; font-weight: 900; text-transform: uppercase; border-radius: 10px; font-size: 1rem; margin-top: 5px; }
        
        footer { padding: 30px; text-align: center; font-size: 0.6rem; color: #333; }
    </style>
</head>
<body>

    <nav><div class="logo">VALENTIA</div></nav>

    <header class="hero">
        <h1>VALENTIA INDUSTRIAL</h1>
    </header>

    <section class="produccion">
        <div class="grid-procesos">
            <div class="proceso"><img src="molderia _.png" alt="Moldería"><h4>Moldería</h4></div>
            <div class="proceso"><img src="corte.png" alt="Corte"><h4>Corte</h4></div>
            <div class="proceso"><img src="estampado_.png" alt="Estampado"><h4>Estampado</h4></div>
            <div class="proceso"><img src="COSTURA_.png" alt="Costura"><h4>Costura</h4></div>
        </div>
    </section>

    <section class="catalogo">
        <div class="grid-productos">
            <div class="producto" onclick="abrirFicha('BAGGY JOGGER', 'Rústico Premium', ['Negro', 'Gris', 'Beige'], [['S', '38', '98'], ['M', '40', '100'], ['L', '42', '102']])">
                <img src="BAGGY.jpeg" alt="Baggy">
                <div class="info-p"><h4>Baggy Joggers</h4></div>
            </div>
            <div class="producto" onclick="abrirFicha('CANGURO MULTIMARCA', 'Frisa Heavy', ['Negro', 'Azul'], [['M', '60', '72'], ['L', '63', '74']])">
                <img src="CANGURO_MULTI.png" alt="Canguro">
                <div class="info-p"><h4>Canguros</h4></div>
            </div>
            <div class="producto" onclick="abrirFicha('REMERA GOLA', 'Jersey 24/1', ['Blanco', 'Negro'], [['S', '52', '70'], ['M', '55', '72']])">
                <img src="gola.PNG" alt="Gola">
                <div class="info-p"><h4>Remera Gola</h4></div>
            </div>
            <div class="producto" onclick="abrirFicha('REMERA MULTIMARCA', 'Jersey 24/1', ['Blanco', 'Negro'], [['S', '48', '68'], ['M', '51', '70']])">
                <img src="multi.PNG" alt="Multi">
                <div class="info-p"><h4>Remera Multimarca</h4></div>
            </div>
            <div class="producto" onclick="abrirFicha('REMERA BASICA', 'Algodón 100%', ['Negro', 'Blanco', 'Gris'], [['S', '48', '68'], ['M', '51', '70']])">
                <img src="BASICA NEGRA.png" alt="Basica">
                <div class="info-p"><h4>Remera Basica</h4></div>
            </div>
            <div class="producto" onclick="abrirFicha('CUELLO REDONDO GOLA', 'Friza Premium', ['Negro', 'Chocolate'], [['S', '48', '68'], ['M', '52', '71']])">
                <img src="redondo_gola.png" alt="Gola Redondo">
                <div class="info-p"><h4>Cuello Gola</h4></div>
            </div>
        </div>
    </section>

    <div id="miModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarFicha()">&times;</span>
            <h2 id="m-titulo" style="font-size: 1.2rem; margin-top: 10px;"></h2>
            <p id="m-material" style="color:var(--acento); font-size: 0.8rem; margin-top:-10px;"></p>
            
            <div class="selector-compra">
                <label>Color</label><select id="select-color"></select>
                <label>Talle</label><select id="select-talle"></select>
            </div>

            <h5 style="color:#555; margin-bottom:5px;">TABLA DE MEDIDAS (cm)</h5>
            <table>
                <thead><tr><th>Talle</th><th>Ancho</th><th>Largo</th></tr></thead>
                <tbody id="m-cuerpo-tabla"></tbody>
            </table>
            <span class="texto-medidas">Las medidas son aproximadas</span>
            
            <button onclick="enviarPedido()" class="btn-enviar-wa">Consultar WhatsApp</button>
        </div>
    </div>

    <footer>
        <p>VALENTIA INDUSTRIAL - @ropadehombreya_</p>
    </footer>

    <script>
        let productoActual = "";
        function abrirFicha(titulo, material, colores, medidas) {
            productoActual = titulo;
            document.getElementById('m-titulo').innerText = titulo;
            document.getElementById('m-material').innerText = material;
            const sc = document.getElementById('select-color'); sc.innerHTML = "";
            colores.forEach(c => { const o = document.createElement('option'); o.value=c; o.innerText=c; sc.appendChild(o); });
            const st = document.getElementById('select-talle'); const tb = document.getElementById('m-cuerpo-tabla');
            st.innerHTML = ""; tb.innerHTML = "";
            medidas.forEach(m => {
                const o = document.createElement('option'); o.value=m[0]; o.innerText=m[0]; st.appendChild(o);
                const r = document.createElement('tr'); r.innerHTML = `<td>${m[0]}</td><td>${m[1]}</td><td>${m[2]}</td>`; tb.appendChild(r);
            });
            document.getElementById('miModal').style.display = "block";
            document.body.style.overflow = "hidden";
        }
        function enviarPedido() {
            const t = document.getElementById('select-talle').value;
            const c = document.getElementById('select-color').value;
            const msj = `Hola Valentia! 👋 Quiero consultar stock de:\n\n📌 *Producto:* ${productoActual}\n📏 *Talle:* ${t}\n🎨 *Color:* ${c}`;
            window.open(`https://wa.me/541134432106?text=${encodeURIComponent(msj)}`, '_blank');
        }
        function cerrarFicha() { document.getElementById('miModal').style.display = "none"; document.body.style.overflow = "auto"; }
    </script>
</body>
</html>
